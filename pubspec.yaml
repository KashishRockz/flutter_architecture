name: flutter_not_ai
description: "A flutter pro ject build manually with no copy paste code from AI."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.9.2
  flutter_riverpod: ^3.3.1
  go_router: ^14.0.0
  flutter_secure_storage: ^8.0.0
  dartz: ^0.10.1
  json_annotation: ^4.9.0
  cupertino_icons: ^1.0.8
  freezed_annotation: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.0
  freezed: ^3.0.0

flutter:
  uses-material-design: true